name: Deploy marketbox (prod)

# Builds the Vite SPA/PWA in the cloud (zero load on the box) and rsyncs dist/ to the nginx webroot
# on the box. Model B — see personal-assistant/docs/deploy-recipe.md. Every push to main that touches
# the frontend auto-deploys to https://marketbox-app.duckdns.org.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.env.production'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: marketbox-prod-deploy
  cancel-in-progress: true

env:
  DEPLOY_HOST: 194.5.65.182
  WEBROOT: /var/www/marketbox

jobs:
  deploy:
    name: Build & Deploy marketbox
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (production)
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist && test -n "$(ls -A dist)" || { echo "::error::dist/ empty"; exit 1; }
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          echo "Build: $(du -sh dist | cut -f1), $(find dist -type f | wc -l) files"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MARKETBOX_DEPLOY_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -p 22 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Backup current webroot (keep last 7)
        run: |
          ssh -i ~/.ssh/deploy -p 22 -o StrictHostKeyChecking=accept-new \
            root@"$DEPLOY_HOST" \
            "tar czf /var/www/marketbox-backup-\$(date +%Y%m%d-%H%M%S).tar.gz -C /var/www marketbox 2>/dev/null || true; \
             ls -t /var/www/marketbox-backup-*.tar.gz 2>/dev/null | tail -n +8 | xargs -r rm -f || true"

      - name: Deploy (rsync dist/ to nginx webroot)
        run: |
          SSH="ssh -i ~/.ssh/deploy -p 22 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=10"
          n=0
          until [ "$n" -ge 3 ]; do
            rsync -avz --delete --timeout=120 -e "$SSH" \
              dist/ root@"$DEPLOY_HOST":"$WEBROOT"/ && break
            n=$((n+1)); echo "::warning::rsync attempt $n failed; retrying in 10s..."; sleep 10
          done
          [ "$n" -lt 3 ] || { echo "::error::rsync to $DEPLOY_HOST failed after 3 attempts"; exit 1; }
          ssh -i ~/.ssh/deploy -p 22 -o StrictHostKeyChecking=accept-new \
            root@"$DEPLOY_HOST" \
            "chown -R www-data:www-data $WEBROOT && systemctl reload nginx && echo reloaded"

      - name: Smoke test (HTTP)
        run: |
          code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 20 https://marketbox-app.duckdns.org/ || echo 000)
          echo "https://marketbox-app.duckdns.org/ -> $code"
          [ "$code" = "200" ] || echo "::warning::smoke test returned $code (not 200)"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy

      - name: Telegram alert on failure
        if: failure()
        run: |
          TOKEN="${{ secrets.MONITOR_TG_BOT_TOKEN }}"
          CHAT="${{ secrets.MONITOR_TG_CHAT_ID }}"
          [ -n "$TOKEN" ] && [ -n "$CHAT" ] || { echo "MONITOR_TG_* not set — skipping alert"; exit 0; }
          TEXT=$(printf '🟠 <b>marketbox deploy FAILED</b>\nBranch: %s\nCommit: %s\nRun: %s' \
            "${{ github.ref_name }}" "${GITHUB_SHA::7}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -o /dev/null --max-time 20 \
            -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode chat_id="$CHAT" \
            --data-urlencode parse_mode=HTML \
            --data-urlencode text="$TEXT" || true
